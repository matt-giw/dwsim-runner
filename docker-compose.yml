# SaaS / dev mode — DWSIM bundled in the image (see Dockerfile)
services:
  dwsim-runner:
    build: .
    # DWSIM's Linux release ships amd64-only native libs; on Apple Silicon
    # this builds/runs under Rosetta emulation.
    platform: linux/amd64
    ports: ["8080:8080"]
    environment:
      SOLVE_TIMEOUT_SECONDS: "60"
      MAX_CONCURRENT_SOLVES: "6"
      # Optional shared API key (FR-016). Set to require X-Api-Key on all
      # routes except GET /health. Unset = open (local dev).
      RUNNER_API_KEY: "${RUNNER_API_KEY:-}"
    volumes:
      - ./templates:/templates:ro
    deploy:
      resources:
        limits:
          memory: 8g   # ~1–2 GB per concurrent worker + headroom
